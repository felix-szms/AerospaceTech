# VitePress 静态站点 Nginx 配置
# 部署位置：/etc/nginx/conf.d/spacecourse.conf
# 重新加载：sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    # 如使用 HTTPS，将 listen 改为：
    # listen 443 ssl http2;
    # 并在下方配置 ssl_certificate / ssl_certificate_key

    # 改成你的域名或服务器 IP
    server_name your-domain.com;

    # 构建产物目录（按实际路径调整）
    root /var/www/spacecourse/docs-site/.vitepress/dist;
    index index.html;

    # 默认字符集
    charset utf-8;

    # ============ 路由规则 ============
    # VitePress 使用 clean URLs（/lessons/lesson-01 而非 .html）
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ============ 缓存策略 ============
    # 带 hash 的静态资源（JS/CSS）—— 永久缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 历史图片 —— 缓存 30 天
    location /history/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Logo / favicon 等根目录静态文件
    location ~* ^/(logo|favicon)\.(svg|ico|png)$ {
        expires 30d;
        access_log off;
    }

    # 字体/图片/SVG —— 缓存 30 天
    location ~* \.(svg|jpg|jpeg|png|gif|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # HTML 文件 —— 不缓存（保证更新及时）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ============ 压缩 ============
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-font-ttf
        application/vnd.ms-fontobject
        image/svg+xml
        font/woff2;

    # ============ 安全头 ============
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============ 性能 ============
    # 隐藏 Nginx 版本号
    server_tokens off;

    # 上传文件大小（一般静态站不需要，留个默认值）
    client_max_body_size 10m;

    # ============ 错误页 ============
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ============ HTTPS 配置（可选，用 Let's Encrypt 后取消注释）============
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ============ HTTP 跳转 HTTPS（如启用 HTTPS，取消下方 server 块注释）============
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
}
